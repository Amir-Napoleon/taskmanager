name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. گرفتن فایل‌های شما
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. نصب پیش‌نیازهای سیستمی روی سرور گیت‌هاب
      - name: Setup dependencies
        run: |
          sudo apt update
          sudo apt-get install -y \
            build-essential \
            git \
            python3 \
            python3-dev \
            python3-pip \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool

      # 3. اجرای اکشن رسمی بیلدوزر برای ساخت APK
      - name: Build with Buildozer
        uses: kivy/buildozer-action@v2
        with:
          command: buildozer android debug

      # 4. آپلود فایل نهایی برای دانلود شما
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
